name: Deploy to DirectAdmin Final Fix

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Sync files to Server
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        # GANTI 'jerryyss.my.id' dengan Alamat IP Server kamu jika tetap gagal
        server: jerryyss.my.id 
        username: mireymireina@jerryyss.my.id
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./
        protocol: ftp
        # Tambahkan baris ini untuk menghindari masalah keamanan sertifikat
        dangerous-clean-slate: false
