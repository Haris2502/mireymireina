name: Deploy to DirectAdmin via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Sync files to Server
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: mireymireina.jerryyss.my.id
        username: jerryyss
        password: ${{ secrets.FTP_PASSWORD }}
        # Path di server kamu sesuai gambar DirectAdmin tadi
        server-dir: ./domains/mireymireina.jerryyss.my.id/public_html/
